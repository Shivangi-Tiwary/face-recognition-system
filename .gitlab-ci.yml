stages:
  - install
  - test

image: node:18

cache:
  paths:
    - node_modules/

install_dependencies:
  stage: install
  script:
    - npm install
  artifacts:
    paths:
      - node_modules/

basic_test:
  stage: test
  script:
    - echo "Running basic backend check..."
    - node -v
    - npm -v
    - if [ -f backend/server.js ]; then node backend/server.js --help || echo "Server file exists"; fi